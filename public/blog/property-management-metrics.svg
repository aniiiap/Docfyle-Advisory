  <path d="M700 460 L1020 460" stroke="#fff" stroke-opacity="0.2" stroke-width="2"/>
  <text x="80" y="100" fill="#fff" fill-opacity="0.9" font-family="system-ui,sans-serif" font-size="28" font-weight="700">Property Management</text>
  <text x="80" y="140" fill="#e8b87a" font-family="system-ui,sans-serif" font-size="22" font-weight="600">Bookkeeping Metrics</text>
