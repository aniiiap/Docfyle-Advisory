      <stop stop-color="#1a2f3a"/>
      <stop offset="0.55" stop-color="#236570"/>
      <stop offset="1" stop-color="#2a7b8c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#e8b87a"/>
      <stop offset="1" stop-color="#c17f3a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="180" fill="#fff" fill-opacity="0.06"/>
  <circle cx="200" cy="520" r="220" fill="#c17f3a" fill-opacity="0.12"/>
  <!-- Building silhouettes -->
  <rect x="120" y="280" width="90" height="220" rx="6" fill="#fff" fill-opacity="0.12"/>
  <rect x="230" y="220" width="110" height="280" rx="6" fill="#fff" fill-opacity="0.18"/>
  <rect x="360" y="260" width="85" height="240" rx="6" fill="#fff" fill-opacity="0.1"/>
  <rect x="465" y="190" width="130" height="310" rx="6" fill="url(#gold)" fill-opacity="0.35"/>
  <!-- Chart bars -->
  <rect x="720" y="340" width="48" height="120" rx="8" fill="#fff" fill-opacity="0.25"/>
  <rect x="790" y="280" width="48" height="180" rx="8" fill="#fff" fill-opacity="0.35"/>
  <rect x="860" y="310" width="48" height="150" rx="8" fill="url(#gold)" fill-opacity="0.8"/>
